---
name: Run pytest

permissions:
  checks: write
  pull-requests: write

on: # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      head:
        required: true
        type: string
      pr-head-sha:
        required: true
        type: string
      publish-results:
        type: boolean
        default: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.head }}
          persist-credentials: false
      - uses: eifinger/setup-rye@c694239a43768373e87d0103d7f547027a23f3c8 # v4.2.9
        with:
          enable-cache: true
      - name: rye-sync
        run: rye sync
      - name: pytest
        run: rye run pytest --junit-xml=pytest.xml
      - uses: actions/upload-artifact@v4
        if: (!cancelled())
        with:
          name: pytest.xml
          path: pytest.xml
          retention-days: 1
      - uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        if: (!cancelled() && inputs.publish-results)
        with:
          files: pytest.xml
          commit: ${{ inputs.pr-head-sha }}
