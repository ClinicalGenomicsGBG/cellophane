# Move non-release PRs to dev branch
---
name: PR Opened/Edit/Reopened on Main

permissions: {}

on: # yamllint disable-line rule:truthy
  pull_request:
    types: [opened, reopened, edited]
    branches: [main]

concurrency:
  group: ${{ github.event.pull_request.number }}-${{ github.workflow }}

jobs:
  move-pr-to-dev:
    uses: ./.github/workflows/def_move-pr.yml
    permissions:
      pull-requests: write
    with:
      pr-number: ${{ github.event.pull_request.number }}
      base: dev

  pytest:
    name: Run tests
    uses: ./.github/workflows/def_pytest.yml
    needs: move-pr-to-dev
    permissions:
      checks: write
      pull-requests: write
    concurrency:
      group: ${{ github.ref }}-${{ github.workflow }}-pytest
    with:
      head: ${{ github.event.pull_request.head.sha }}
      pr-head-sha: ${{ github.event.pull_request.head.sha }}
