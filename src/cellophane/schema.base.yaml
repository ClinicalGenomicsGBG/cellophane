required:
  - workdir
  - resultdir
  - logdir


properties:
  log:
    type: object
    properties:
      level:
        default: INFO
        description: Log level (NOTSET will log all messages, including those from external libraries)
        enum:
          - NOTSET
          - DEBUG
          - INFO
          - WARNING
          - ERROR
          - CRITICAL
        type: string
      external:
        default: false
        description: Log messages from external libraries
        type: boolean
      clean:
        default: true
        description: Remove main log file after successful pipeline run
        type: boolean

  executor:
    type: object
    properties:
      name:
        type: string
        description: Name of the executor to use
        default: subprocess
      cpus:
        type: integer
        description: Number of CPUs to allocate to jobs started (if supported by the executor)
        default: 1
      memory:
        type: size
        description: Ammount of memory to allocate to jobs started (if supported by the executor)
        default: 2 GB
      environment:
        type: object
        properties:
          cache:
            description: Directory to use for caching environments.
            type: path
          copy_to_workdir:
            description: Copy cached environments to the job workdir before execution. If disabled, the cache directory must be available on the system where the jobs are executed.
            type: boolean
            default: true
          platform:
            description: Platform to use when building environments. If not specified, the platform of the system where the wrapper is running will be used.
            type: string
            enum:
              - unknown
              - linux-32
              - linux-64
              - linux-aarch64
              - linux-armv6l
              - linux-armv7l
              - linux-loongarch64
              - linux-ppc64le
              - linux-ppc64
              - linux-ppc
              - linux-s390x
              - linux-riscv32
              - linux-riscv64
              - freebsd-64
              - osx-64
              - osx-arm64
              - win-32
              - win-64
              - win-arm64
              - emscripten-wasm32
              - wasi-wasm32
              - zos-z

  config_file:
    description: Path to config file
    type: path

  logdir:
    description: Log directory
    type: path

  workdir:
    description: Working directory where intermediate files are stored
    type: path

  resultdir:
    description: Results base directory where output files are copied
    type: path

  tag:
    description: Tag identifying the pipeline run (defaults to a timestamp - YYMMDDHHMMSS)
    type: string

  samples_file:
    description: "Path YAML file with samples - eg [{id: ID, files: [F1, F2]}, ...]"
    type: path

  clean:
    description: Clean intermediate files after pipeline run
    type: boolean
    default: true